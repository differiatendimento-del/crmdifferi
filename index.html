<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Differi Imóveis — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#1a4f7a;--azul2:#2d7ab5;--dourado:#c49a3c;--laranja:#e8743b;
  --bg:#f4f3f0;--branco:#fff;--c1:#f0eeea;--c2:#e2dfd9;--c3:#9b9589;
  --texto:#1c1a17;--texto2:#5c5850;--radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--texto)}

.header{background:var(--azul);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{display:flex;align-items:center;gap:10px;color:#fff}
.logo strong{font-size:17px;font-weight:600}
.logo small{font-size:11px;color:rgba(255,255,255,.5)}
.header-btns{display:flex;gap:6px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-gold{background:var(--dourado);color:#fff}.btn-gold:hover{background:#b08830}
.btn-outline{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-outline:hover{background:rgba(255,255,255,.22)}
.btn-blue{background:var(--azul2);color:#fff}.btn-blue:hover{background:#256d9e}
.btn-green{background:#25D366;color:#fff}.btn-green:hover{background:#1fb956}
.btn-light{background:var(--c1);color:var(--texto2);border:1px solid var(--c2)}.btn-light:hover{background:var(--c2)}
.btn-danger{background:#fce8e8;color:#c0392b;border:1px solid #f5c6c6}.btn-danger:hover{background:#f5c6c6}
.btn-sm{padding:5px 10px;font-size:12px}

/* HERO BUSCA — estilo Cinata */
.hero{background:linear-gradient(120deg,var(--azul) 0%,var(--azul) 45%,var(--laranja) 100%);padding:36px 20px 44px;text-align:center}
.hero h1{color:#fff;font-size:24px;font-weight:600;margin-bottom:22px}
.search-card{background:var(--branco);border-radius:14px;max-width:980px;margin:0 auto;padding:18px 22px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.search-tabs{display:flex;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.stab{padding:8px 18px;border-radius:8px;border:1px solid var(--c2);background:var(--branco);color:var(--texto2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.stab.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.search-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;text-align:left}
.search-grid .fg{margin:0}
.search-grid label{font-size:11px;font-weight:600;color:var(--c3);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px}
.search-grid select,.search-grid input{width:100%;padding:9px 10px;border-radius:8px;border:1.5px solid var(--c2);font-size:13px;font-family:'Inter',sans-serif;background:var(--branco);color:var(--texto);outline:none}
.search-grid select:focus,.search-grid input:focus{border-color:var(--azul2)}
.valor-row{display:flex;gap:6px}
.btn-buscar{margin-top:14px;width:100%;background:var(--azul);color:#fff;padding:13px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-buscar:hover{background:#143f63}

.filtros{background:var(--branco);border-bottom:1px solid var(--c2);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--c2);background:var(--branco);color:var(--texto2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.tab:hover{border-color:var(--azul2);color:var(--azul)}
.tab.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.badge-count{font-size:12px;color:var(--c3);white-space:nowrap;margin-left:auto}
.view-btns{display:flex;gap:3px}
.view-btn{padding:6px 9px;border-radius:7px;border:1px solid var(--c2);background:var(--branco);color:var(--c3);cursor:pointer;font-size:15px;line-height:1}
.view-btn.on{background:var(--azul);color:#fff;border-color:var(--azul)}

.main{padding:20px;max-width:1400px;margin:0 auto}
.sec-label{font-size:11px;font-weight:600;color:var(--c3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--c2);display:flex;align-items:center;gap:8px}
.sec-label em{background:var(--c2);color:var(--texto2);border-radius:10px;padding:1px 7px;font-style:normal;font-size:11px}
.sec{margin-bottom:28px}
.bairro-label{font-size:12px;font-weight:600;color:var(--c3);margin-bottom:10px;margin-top:14px;display:flex;align-items:center;gap:5px}
.bairro-label em{background:var(--c2);border-radius:8px;padding:1px 6px;font-style:normal;font-size:11px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:var(--branco);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;cursor:pointer;border:1px solid var(--c2)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.thumb{height:165px;background:linear-gradient(135deg,#1a4f7a,#2d7ab5);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.thumb-icon{opacity:.2;z-index:0}
.cat-tag{position:absolute;top:8px;left:8px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;z-index:1}
.cat-lancamento{background:#FF6B35;color:#fff}
.cat-planta{background:#2d7ab5;color:#fff}
.cat-pronto{background:#2d8a4e;color:#fff}
.cbody{padding:12px 14px}
.cnome{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3}
.cbairro{font-size:12px;color:var(--c3);margin-bottom:8px}
.cmeta{display:flex;gap:8px;font-size:11px;color:var(--texto2);margin-bottom:8px;flex-wrap:wrap}
.cmeta span{background:var(--c1);padding:2px 7px;border-radius:5px}
.cpreco{font-size:15px;font-weight:600;color:var(--azul);margin-bottom:10px}
.cpreco small{font-size:11px;font-weight:400;color:var(--c3)}
.cactions{display:flex;gap:5px;flex-wrap:wrap}
.cactions .btn{flex:1;justify-content:center;font-size:12px;padding:6px 8px;min-width:0}

.list .grid{display:flex;flex-direction:column;gap:8px}
.list .card{display:flex;flex-direction:row;height:90px}
.list .thumb{width:120px;min-width:120px;height:90px;border-radius:var(--radius) 0 0 var(--radius);flex-shrink:0}
.list .cat-tag{font-size:10px;padding:2px 6px;top:6px;left:6px}
.list .cbody{display:flex;align-items:center;gap:12px;flex:1;padding:8px 12px;flex-wrap:wrap;overflow:hidden}
.list .cnome{font-size:13px;font-weight:600;min-width:140px;margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list .cbairro{margin-bottom:0;font-size:11px}
.list .cmeta{margin-bottom:0}
.list .cpreco{margin-bottom:0;font-size:13px}
.list .cactions{margin-left:auto;flex-shrink:0;flex-wrap:nowrap}
.list .bairro-label{display:none}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--branco);border-radius:14px;width:620px;max-width:100%;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{width:800px}
.mhead{background:var(--azul);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0}
.mhead h2{color:#fff;font-size:16px;font-weight:600}
.mclose{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbody{padding:20px 22px;max-height:80vh;overflow-y:auto}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:9px 11px;border-radius:8px;border:1.5px solid var(--c2);font-family:'Inter',sans-serif;font-size:13px;color:var(--texto);background:var(--branco);outline:none;transition:border-color .15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--azul2)}
.fg textarea{min-height:70px;resize:vertical}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.mfoot{padding:14px 22px;border-top:1px solid var(--c2);display:flex;justify-content:flex-end;gap:8px;border-radius:0 0 14px 14px}
.err{color:#c0392b;font-size:12px;padding:8px 10px;background:#fce8e8;border-radius:7px;margin-top:8px;display:none}
.flink{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;background:var(--c1);color:var(--texto2);font-size:12px;font-weight:500;text-decoration:none;border:1px solid var(--c2);transition:all .15s}
.flink:hover{background:var(--azul);color:#fff;border-color:var(--azul)}
.section-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}

.det-hero{width:100%;height:220px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:block}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.det-item label{font-size:11px;font-weight:600;color:var(--c3);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:2px}
.det-item span{font-size:14px;font-weight:500}
.det-desc{font-size:13px;color:var(--texto2);line-height:1.7;padding:11px;background:var(--c1);border-radius:8px;margin-bottom:14px}
.det-files h4{font-size:11px;font-weight:600;color:var(--c3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.det-actions{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--c2);flex-wrap:wrap}

.empty,.loading{text-align:center;padding:52px 20px;color:var(--c3)}
.empty p,.loading p{font-size:14px;margin-top:10px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--c2);border-top-color:var(--azul2);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:20px;right:20px;background:var(--azul);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}

@media(max-width:900px){
  .search-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .hero{padding:24px 12px 32px}
  .hero h1{font-size:18px;margin-bottom:16px}
  .search-card{padding:14px}
  .search-grid{grid-template-columns:1fr}
  .filtros{padding:8px 12px}
  .main{padding:12px}
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .thumb{height:120px}
  .cbody{padding:9px 11px}
  .cnome{font-size:13px}
  .fgrid{grid-template-columns:1fr}
  .full{grid-column:1}
  .det-grid{grid-template-columns:1fr}
  .list .card{height:auto;flex-direction:column}
  .list .thumb{width:100%;height:120px;border-radius:var(--radius) var(--radius) 0 0}
}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect width="26" height="26" rx="6" fill="rgba(255,255,255,.15)"/><path d="M6 19V10l7-4 7 4v9" stroke="white" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 19v-5h6v5" stroke="white" stroke-width="1.8" stroke-linejoin="round"/></svg>
    <div><strong>Differi Imóveis</strong> <small>· Catálogo Interno</small></div>
  </div>
  <div class="header-btns">
    <button class="btn btn-outline btn-sm" onclick="carregarImoveis()">↺ Atualizar</button>
    <button class="btn btn-gold btn-sm" onclick="abrirCadastro()">+ Novo imóvel</button>
  </div>
</header>

<div class="hero">
  <h1>Pesquise agora e dê o primeiro passo!</h1>
  <div class="search-card">
    <div class="search-tabs">
      <button class="stab on" onclick="setSearchTab('',this)">Todos</button>
      <button class="stab" onclick="setSearchTab('lancamento',this)">Lançamentos</button>
      <button class="stab" onclick="setSearchTab('planta',this)">Na planta</button>
      <button class="stab" onclick="setSearchTab('pronto',this)">Pronto p/ morar</button>
    </div>
    <div class="search-grid">
      <div class="fg"><label>Tipo</label><select id="f-tipo" onchange="render()">
        <option value="">Todos</option>
        <option>Apartamento</option><option>Apartamento Duplex</option><option>Apartamento Garden</option>
        <option>Apartamento Térreo</option><option>Casa</option><option>Casa em Condomínio</option>
        <option>Cobertura</option><option>Flat</option><option>Flat Garden</option><option>Loft</option>
        <option>Lote</option><option>Lote em Condomínio</option><option>Studio</option><option>Studio Duplex</option>
        <option>Terreno</option>
      </select></div>
      <div class="fg"><label>Cidade</label><select id="f-cidade" onchange="popularBairros();render()">
        <option value="">Todas</option>
        <option>João Pessoa</option><option>Cabedelo</option><option>Bayeux</option><option>Bananeiras</option><option>Conde</option>
      </select></div>
      <div class="fg"><label>Bairro</label><select id="f-bairro" onchange="render()"><option value="">Todos</option></select></div>

      </select></div>

        <div class="valor-row">
          <input type="number" id="f-preco-min" placeholder="Mín" oninput="render()">
          <input type="number" id="f-preco-max" placeholder="Máx" oninput="render()">
        </div>
      </div>
    </div>
    <input class="search-grid-busca" id="f-busca" placeholder="🔍 Buscar por nome do empreendimento ou construtora..." oninput="render()" style="width:100%;margin-top:12px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--c2);font-size:13px;font-family:'Inter',sans-serif;outline:none">
    <button class="btn-buscar" onclick="buscarImoveis()">🔍 Buscar imóveis</button>
  </div>
</div>

<div class="filtros">
  <span class="badge-count" id="badge"></span>
  <div class="view-btns">
    <button class="view-btn on" id="btn-grid" onclick="setView('grid')" title="Grade">⊞</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')" title="Lista">☰</button>
  </div>
</div>

<main class="main" id="main">
  <div class="loading"><div class="spinner"></div><p>Carregando imóveis...</p></div>
</main>

<div class="overlay" id="ov-det">
  <div class="modal modal-lg">
    <div class="mhead"><h2 id="det-nome">Detalhes</h2><button class="mclose" onclick="fecharDet()">×</button></div>
    <div class="mbody" id="det-body"></div>
  </div>
</div>

<div class="overlay" id="ov-cad">
  <div class="modal modal-lg">
    <div class="mhead"><h2 id="cad-title">Cadastrar Imóvel</h2><button class="mclose" onclick="fecharCad()">×</button></div>
    <div class="mbody">
      <div class="fgrid">
        <div class="fg full"><label>Nome do empreendimento *</label><input id="c-nome" placeholder="Ex: Alti H-Station"></div>
        <div class="fg"><label>Tipo</label><select id="c-tipo">
          <option>Apartamento</option><option>Apartamento Duplex</option><option>Apartamento Garden</option>
          <option>Apartamento Térreo</option><option>Casa</option><option>Casa em Condomínio</option>
          <option>Cobertura</option><option>Flat</option><option>Flat Garden</option><option>Loft</option>
          <option>Lote</option><option>Lote em Condomínio</option><option>Studio</option><option>Studio Duplex</option>
          <option>Terreno</option>
        </select></div>
        <div class="fg"><label>Cidade *</label><select id="c-cidade" onchange="popularBairrosCadastro()">
          <option>João Pessoa</option><option>Cabedelo</option><option>Bayeux</option><option>Bananeiras</option><option>Conde</option>
        </select></div>
        <div class="fg"><label>Bairro *</label><input id="c-bairro" placeholder="Ex: Manaíra" list="bairros-lista"><datalist id="bairros-lista"></datalist></div>
        <div class="fg"><label>Categoria *</label><select id="c-cat"><option value="lancamento">Lançamento</option><option value="planta">Na planta</option><option value="pronto">Pronto</option></select></div>
        <div class="fg"><label>Construtora</label><input id="c-const" placeholder="Ex: H-Station"></div>
        <div class="fg"><label>Preço a partir (R$)</label><input type="number" id="c-preco" placeholder="450000"></div>
        <div class="fg"><label>Metragem (m²)</label><input id="c-m2" placeholder="Ex: 65 a 110"></div>
        <div class="fg"><label>Quartos</label><input id="c-qtos" placeholder="Ex: 2 ou 3"></div>
        <div class="fg"><label>Vagas</label><input id="c-vagas" placeholder="Ex: 1 ou 2"></div>
        <div class="fg"><label>Previsão de entrega</label><input id="c-entrega" placeholder="Ex: Dez/2026"></div>
        <div class="fg full"><label>Descrição / Diferenciais</label><textarea id="c-desc" placeholder="Descreva o imóvel..."></textarea></div>
        <div class="fg full"><label>WhatsApp para contato (somente números)</label><input id="c-wpp" placeholder="5583999999999"></div>
      </div>
      <hr style="border:none;border-top:1px solid var(--c2);margin:4px 0 14px">
      <div style="font-size:12px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">📎 Links de arquivos (Google Drive)</div>
      <div class="fgrid">
        <div class="fg"><label>Foto principal (URL)</label><input id="c-foto" placeholder="https://drive.google.com/..."></div>
        <div class="fg"><label>Book / Apresentação</label><input id="c-book" placeholder="https://drive.google.com/..."></div>
        <div class="fg"><label>Tabela de preços</label><input id="c-tabela" placeholder="https://drive.google.com/..."></div>
        <div class="fg"><label>Plantas</label><input id="c-plantas" placeholder="https://drive.google.com/..."></div>
        <div class="fg full"><label>Pasta de fotos</label><input id="c-fotos" placeholder="https://drive.google.com/..."></div>
      </div>
      <div class="err" id="cad-err"></div>
    </div>
    <div class="mfoot">
      <button class="btn btn-light" onclick="fecharCad()">Cancelar</button>
      <button class="btn btn-gold" onclick="salvar()" id="btn-salvar">💾 Salvar imóvel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://rlmtsmqksedpkjezboko.supabase.co';
const SB_KEY = 'sb_publishable_C8vI_EAoYaP9Um-Y9o5tig_Wxs1OQDS';
const WPP_PADRAO = '5583982217424';

const BAIRROS_POR_CIDADE = {
  'João Pessoa': ['Altiplano','Aeroclube','Manaíra','Tambaú','Cabo Branco','Bessa','Miramar','Jardim Luna','Brisamar','Estados','Torre','Seixas','Portal do Sol','Pedro Gondim','Jardim Cidade Universitária','Mangabeira','Colibris','Água Fria','Bancários','José Américo','Jardim Oceania','Tambauzinho','Tambiá','Treze de Maio','Valentina','Bairro dos Estados','Cristo Redentor','Cruz das Armas','Geisel','Gramame','Mandacaru','Muçumagro','Novo Geisel','Planalto Boa Esperança','Rangel','Colinas do Sul','Alto do Céu'],
  'Cabedelo': ['Intermares','Camboinha','Formosa','Poço','Ponta de Matos','Ponta de Campina','Areia Dourada','Amazônia Park','Jacaré','Jardim Camboinha','Centro'],
  'Bayeux': ['Centro','Timbó','Camalaú'],
  'Bananeiras': ['Centro'],
  'Conde': ['Jacumã','Tabatinga','Carapibus']
};

let imoveis=[];
let tabAtiva='';
let viewMode='grid';
let editId=null;

async function sb(path, opts={}){
  const r = await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!r.ok){const e=await r.text();throw new Error(e)}
  const txt=await r.text();
  return txt?JSON.parse(txt):[];
}

async function carregarImoveis(){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div><p>Carregando imóveis...</p></div>';
  try{
    imoveis = await sb('imoveis?order=nome.asc&ativo=eq.true&select=*');
    popularBairros();
    render();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="empty"><p>❌ Erro ao carregar: ${e.message}</p></div>`;
  }
}

function popularBairros(){
  const cidade=document.getElementById('f-cidade').value;
  const sel=document.getElementById('f-bairro');
  const cur=sel.value;
  let bairros;
  if(cidade && BAIRROS_POR_CIDADE[cidade]){
    bairros=BAIRROS_POR_CIDADE[cidade];
  } else {
    bairros=[...new Set(imoveis.map(i=>i.bairro).filter(Boolean))].sort();
  }
  sel.innerHTML='<option value="">Todos</option>'+bairros.map(b=>`<option${b===cur?' selected':''}>${b}</option>`).join('');
}
function popularBairrosCadastro(){
  const cidade=document.getElementById('c-cidade').value;
  const dl=document.getElementById('bairros-lista');
  const bairros=BAIRROS_POR_CIDADE[cidade]||[];
  dl.innerHTML=bairros.map(b=>`<option value="${b}">`).join('');
}

function buscarImoveis(){
  document.getElementById('main').scrollIntoView({behavior:'smooth'});
  render();
  toast('🔍 '+filtrados().length+' imóvel(is) encontrado(s)');
}
function setSearchTab(t,el){
  tabAtiva=t;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function filtrados(){
  const busca=document.getElementById('f-busca').value.toLowerCase();
  const bairro=document.getElementById('f-bairro').value;
  const cidade=document.getElementById('f-cidade').value;
  const tipo=document.getElementById('f-tipo').value;
  const quartos=document.getElementById('f-quartos').value;
  const pMin=parseFloat(document.getElementById('f-preco-min').value)||0;
  const pMax=parseFloat(document.getElementById('f-preco-max').value)||Infinity;
  return imoveis.filter(i=>{
    if(tabAtiva && i.categoria!==tabAtiva) return false;
    if(bairro && i.bairro!==bairro) return false;
    if(cidade && (i.cidade||'João Pessoa')!==cidade) return false;
    if(tipo && i.tipo!==tipo) return false;
    if(quartos && parseInt(i.quartos)<parseInt(quartos)) return false;
    if(i.preco && (i.preco<pMin || i.preco>pMax)) return false;
    if((pMin>0||pMax<Infinity) && !i.preco) return false;
    if(busca && !i.nome.toLowerCase().includes(busca) && !(i.bairro||'').toLowerCase().includes(busca) && !(i.construtora||'').toLowerCase().includes(busca)) return false;
    return true;
  });
}

function render(){
  const lista=filtrados();
  document.getElementById('badge').textContent=lista.length+' imóvel'+(lista.length!==1?'is':'');

  const main=document.getElementById('main');
  main.className=viewMode==='list'?'main list':'main';

  if(!lista.length){
    main.innerHTML=imoveis.length?'<div class="empty"><p>Nenhum imóvel com esses filtros.</p></div>':'<div class="empty"><p>Nenhum imóvel cadastrado ainda.</p></div>';
    return;
  }

  const cats=[
    {key:'lancamento',label:'🔥 Lançamentos'},
    {key:'planta',label:'🏗 Na planta'},
    {key:'pronto',label:'🏠 Prontos para morar'}
  ];

  if(tabAtiva){
    main.innerHTML=`<div class="grid">${lista.map(cardHTML).join('')}</div>`;
  } else {
    let html='';
    cats.forEach(cat=>{
      const sub=lista.filter(i=>i.categoria===cat.key);
      if(!sub.length) return;
      const porBairro={};
      sub.forEach(i=>{const b=i.bairro||'Sem bairro';if(!porBairro[b])porBairro[b]=[];porBairro[b].push(i);});
      let inner='';
      Object.entries(porBairro).sort().forEach(([b,items])=>{
        inner+=`<div class="bairro-label">📍 ${b} <em>${items.length}</em></div><div class="grid">${items.map(cardHTML).join('')}</div>`;
      });
      html+=`<div class="sec"><div class="sec-label">${cat.label} <em>${sub.length}</em></div>${inner}</div>`;
    });
    main.innerHTML=html||'<div class="empty"><p>Nenhum imóvel encontrado.</p></div>';
  }
}

function labelCat(c){return c==='lancamento'?'Lançamento':c==='planta'?'Na planta':'Pronto'}

function fotoURL(i){
  if(!i.foto_url) return '';
  const m=i.foto_url.match(/\/d\/([^\/\?]+)/);
  if(m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  if(i.foto_url.includes('wsrv.nl')||i.foto_url.includes('thumbnail?id=')) return i.foto_url;
  return `https://wsrv.nl/?url=${encodeURIComponent(i.foto_url)}&w=400&h=220&fit=cover&output=jpg`;
}

function cardHTML(i){
  const preco=i.preco?'R$ '+parseInt(i.preco).toLocaleString('pt-BR'):'';
  const meta=[
    i.m2?`📐 ${i.m2}m²`:'',
    i.quartos?`🛏 ${i.quartos}q`:'',
    i.vagas?`🚗 ${i.vagas}v`:'',
    i.entrega?`📅 ${i.entrega}`:''
  ].filter(Boolean).map(m=>`<span>${m}</span>`).join('');
  const foto=fotoURL(i);
  const wpp=i.whatsapp||WPP_PADRAO;

  return `<div class="card" onclick="abrirDet('${i.id}')">
    <div class="thumb">
      ${foto?`<img src="${foto}" alt="${i.nome}" onerror="this.style.display='none'">`:``}
      <svg class="thumb-icon" width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M8 38V16L24 8l16 8v22" stroke="white" stroke-width="2.5" stroke-linejoin="round"/><path d="M16 38V28h16v10" stroke="white" stroke-width="2.5" stroke-linejoin="round"/></svg>
      <span class="cat-tag cat-${i.categoria}">${labelCat(i.categoria)}</span>
    </div>
    <div class="cbody">
      <div class="cnome">${i.nome}</div>
      <div class="cbairro">📍 ${i.bairro||''}${i.cidade&&i.cidade!=='João Pessoa'?' · '+i.cidade:''}</div>
      ${meta?`<div class="cmeta">${meta}</div>`:''}
      ${preco?`<div class="cpreco">${preco} <small>a partir de</small></div>`:'<div style="height:4px"></div>'}
      <div class="cactions" onclick="event.stopPropagation()">
        <button class="btn btn-blue btn-sm" onclick="abrirDet('${i.id}')">Ver</button>
        <a class="btn btn-green btn-sm" href="https://wa.me/${wpp}?text=Olá!%20Tenho%20interesse%20no%20${encodeURIComponent(i.nome)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">💬</a>
        ${i.fotos_url?`<a class="btn btn-light btn-sm" href="${i.fotos_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Ver pasta Drive">📁</a>`:''}
      </div>
    </div>
  </div>`;
}

function abrirDet(id){
  const i=imoveis.find(x=>x.id===id);
  if(!i) return;
  document.getElementById('det-nome').textContent=i.nome;
  const wpp=i.whatsapp||WPP_PADRAO;
  const foto=fotoURL(i);
  const links=[
    i.book_url?`<a href="${i.book_url}" target="_blank" class="flink">📋 Book</a>`:'',
    i.tabela_url?`<a href="${i.tabela_url}" target="_blank" class="flink">💰 Tabela de preços</a>`:'',
    i.plantas_url?`<a href="${i.plantas_url}" target="_blank" class="flink">📐 Plantas</a>`:'',
    i.fotos_url?`<a href="${i.fotos_url}" target="_blank" class="flink">📸 Fotos</a>`:'',
  ].filter(Boolean).join('');

  document.getElementById('det-body').innerHTML=`
    ${foto?`<img src="${foto}" class="det-hero" onerror="this.style.display='none'">`:''}
    <div class="det-grid">
      <div class="det-item"><label>Bairro</label><span>${i.bairro||'—'}</span></div>
      <div class="det-item"><label>Cidade</label><span>${i.cidade||'João Pessoa'}</span></div>
      <div class="det-item"><label>Categoria</label><span class="cat-tag cat-${i.categoria}" style="position:static;font-size:12px">${labelCat(i.categoria)}</span></div>
      <div class="det-item">
        <label>Preço <span style="color:var(--c3);font-weight:400;text-transform:none">(clique para editar)</span></label>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--c3);font-size:13px">R$</span>
          <input type="number" id="quick-preco" value="${i.preco||''}" placeholder="Sem valor" style="border:1px solid var(--c2);border-radius:6px;padding:4px 8px;font-size:15px;font-weight:600;color:var(--azul);width:140px;font-family:'Inter',sans-serif" onkeydown="if(event.key==='Enter')salvarPrecoRapido('${i.id}')">
          <button class="btn btn-blue btn-sm" onclick="salvarPrecoRapido('${i.id}')" title="Salvar preço">💾</button>
        </div>
      </div>
      ${i.construtora?`<div class="det-item"><label>Construtora</label><span>${i.construtora}</span></div>`:''}
      ${i.tipo?`<div class="det-item"><label>Tipo</label><span>${i.tipo}</span></div>`:''}
      ${i.m2?`<div class="det-item"><label>Metragem</label><span>${i.m2} m²</span></div>`:''}
      ${i.quartos?`<div class="det-item"><label>Quartos</label><span>${i.quartos}</span></div>`:''}
      ${i.vagas?`<div class="det-item"><label>Vagas</label><span>${i.vagas}</span></div>`:''}
      ${i.entrega?`<div class="det-item"><label>Entrega</label><span>${i.entrega}</span></div>`:''}
    </div>
    ${i.descricao?`<div class="det-desc">${i.descricao}</div>`:''}
    ${links?`<div class="det-files" style="margin-bottom:14px"><h4>📁 Arquivos</h4><div class="section-links">${links}</div></div>`:''}
    <div class="det-actions">
      <a class="btn btn-green" href="https://wa.me/${wpp}?text=Olá!%20Tenho%20interesse%20no%20${encodeURIComponent(i.nome)}" target="_blank" rel="noopener">💬 WhatsApp</a>
      <button class="btn btn-blue" onclick="fecharDet();abrirCadastro('${i.id}')">✏️ Editar tudo</button>
      <button class="btn btn-danger" onclick="deletar('${i.id}')">🗑️ Remover</button>
    </div>`;
  document.getElementById('ov-det').classList.add('open');
}
function fecharDet(){document.getElementById('ov-det').classList.remove('open')}

async function salvarPrecoRapido(id){
  const valor=document.getElementById('quick-preco').value;
  const preco=valor?parseFloat(valor):null;
  try{
    await sb(`imoveis?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({preco})});
    const idx=imoveis.findIndex(x=>x.id===id);
    if(idx>=0)imoveis[idx].preco=preco;
    toast('✅ Preço salvo!');
    render();
  }catch(e){
    toast('Erro ao salvar preço: '+e.message);
  }
}

function abrirCadastro(id){
  editId=id||null;
  document.getElementById('cad-title').textContent=id?'Editar Imóvel':'Cadastrar Imóvel';
  const campos=['c-nome','c-bairro','c-const','c-preco','c-m2','c-qtos','c-vagas','c-entrega','c-desc','c-wpp','c-foto','c-book','c-tabela','c-plantas','c-fotos'];
  if(id){
    const i=imoveis.find(x=>x.id===id);
    if(i){
      document.getElementById('c-nome').value=i.nome||'';
      document.getElementById('c-tipo').value=i.tipo||'Apartamento';
      document.getElementById('c-cidade').value=i.cidade||'João Pessoa';
      popularBairrosCadastro();
      document.getElementById('c-bairro').value=i.bairro||'';
      document.getElementById('c-cat').value=i.categoria||'lancamento';
      document.getElementById('c-const').value=i.construtora||'';
      document.getElementById('c-preco').value=i.preco||'';
      document.getElementById('c-m2').value=i.m2||'';
      document.getElementById('c-qtos').value=i.quartos||'';
      document.getElementById('c-vagas').value=i.vagas||'';
      document.getElementById('c-entrega').value=i.entrega||'';
      document.getElementById('c-desc').value=i.descricao||'';
      document.getElementById('c-wpp').value=i.whatsapp||'';
      document.getElementById('c-foto').value=i.foto_url||'';
      document.getElementById('c-book').value=i.book_url||'';
      document.getElementById('c-tabela').value=i.tabela_url||'';
      document.getElementById('c-plantas').value=i.plantas_url||'';
      document.getElementById('c-fotos').value=i.fotos_url||'';
    }
  } else {
    campos.forEach(c=>document.getElementById(c).value='');
    document.getElementById('c-tipo').value='Apartamento';
    document.getElementById('c-cidade').value='João Pessoa';
    document.getElementById('c-cat').value='lancamento';
    popularBairrosCadastro();
  }
  document.getElementById('cad-err').style.display='none';
  document.getElementById('ov-cad').classList.add('open');
}
function fecharCad(){document.getElementById('ov-cad').classList.remove('open');editId=null}

async function salvar(){
  const nome=document.getElementById('c-nome').value.trim();
  const bairro=document.getElementById('c-bairro').value.trim();
  const err=document.getElementById('cad-err');
  if(!nome||!bairro){err.textContent='Nome e bairro são obrigatórios.';err.style.display='block';return}
  const btn=document.getElementById('btn-salvar');
  btn.textContent='Salvando...';btn.disabled=true;
  const obj={
    nome,bairro,
    tipo:document.getElementById('c-tipo').value,
    cidade:document.getElementById('c-cidade').value,
    categoria:document.getElementById('c-cat').value,
    construtora:document.getElementById('c-const').value.trim()||null,
    preco:parseFloat(document.getElementById('c-preco').value)||null,
    m2:document.getElementById('c-m2').value.trim()||null,
    quartos:document.getElementById('c-qtos').value.trim()||null,
    vagas:document.getElementById('c-vagas').value.trim()||null,
    entrega:document.getElementById('c-entrega').value.trim()||null,
    descricao:document.getElementById('c-desc').value.trim()||null,
    whatsapp:document.getElementById('c-wpp').value.trim()||null,
    foto_url:document.getElementById('c-foto').value.trim()||null,
    book_url:document.getElementById('c-book').value.trim()||null,
    tabela_url:document.getElementById('c-tabela').value.trim()||null,
    plantas_url:document.getElementById('c-plantas').value.trim()||null,
    fotos_url:document.getElementById('c-fotos').value.trim()||null,
    ativo:true
  };
  try{
    if(editId){
      await sb(`imoveis?id=eq.${editId}`,{method:'PATCH',body:JSON.stringify(obj)});
      toast('✅ Imóvel atualizado!');
    } else {
      await sb('imoveis',{method:'POST',body:JSON.stringify(obj)});
      toast('✅ Imóvel cadastrado!');
    }
    fecharCad();
    await carregarImoveis();
  }catch(e){
    err.textContent='Erro: '+e.message;err.style.display='block';
  }
  btn.textContent='💾 Salvar imóvel';btn.disabled=false;
}

async function deletar(id){
  if(!confirm('Remover este imóvel?')) return;
  try{
    await sb(`imoveis?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({ativo:false})});
    fecharDet();
    toast('Imóvel removido.');
    await carregarImoveis();
  }catch(e){toast('Erro: '+e.message)}
}

function setView(mode){
  viewMode=mode;
  document.getElementById('btn-grid').classList.toggle('on',mode==='grid');
  document.getElementById('btn-list').classList.toggle('on',mode==='list');
  render();
}
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',dur);
}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')}));

popularBairros();
carregarImoveis();
</script>
</body>
</html>
